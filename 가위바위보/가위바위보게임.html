<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 가위바위보 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 화면 디자인 설정 */
        body {
            font-family: 'Jua', sans-serif; /* 귀여운 폰트 적용 */
            background-color: #fdf6e3; /* 따뜻하고 부드러운 배경색 */
            text-align: center; 
            margin: 0;
            padding: 20px;
            color: #333;
        }
        
        /* 제목 디자인 */
        .title {
            font-size: 3em; 
            color: #ff7f50; /* 산뜻한 코랄색 */
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* 1. 게임 안내서 영역 디자인 */
        .guide-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .guide-item {
            background-color: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 1.5em;
        }
        /* 직접 만든 이미지를 넣으실 때는 아래 img 태그의 크기를 조절하는 css를 활용하세요 */
        .guide-item img {
            width: 50px; 
            height: 50px;
        }

        /* 버튼 디자인 공통 */
        button {
            font-family: 'Jua', sans-serif;
            font-size: 1.5em;
            padding: 10px 30px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        #start-btn { background-color: #4CAF50; color: white; }
        #start-btn:hover { background-color: #45a049; }
        
        #play-btn { background-color: #2196F3; color: white; display: none; /* 처음엔 숨겨둡니다 */ }
        #play-btn:hover { background-color: #0b7dda; }

        /* 게임 화면(웹캠과 컴퓨터 화면) 영역 */
        .game-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin-top: 30px;
        }

        .player-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-box span { font-size: 1.5em; margin-bottom: 10px; color: #555; }

        /* 컴퓨터의 선택이 보여지는 둥근 상자 */
        #computer-screen {
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 5px dashed #ccc;
        }

        /* 웹캠 화면 테두리 둥글게 */
        #webcam-container canvas {
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 결과 텍스트 영역 */
        #result-text {
            font-size: 3em;
            margin-top: 30px;
            color: #e74c3c;
            height: 50px; /* 공간 미리 확보 */
        }
    </style>
</head>
<body>
    <div class="title">AI 가위바위보 게임</div>
    
    <div class="guide-container">
        <div class="guide-item">✌️ 가위</div>
        <div class="guide-item">✊ 바위</div>
        <div class="guide-item">🖐️ 보</div>
    </div>

    <div>
        <button id="start-btn" type="button" onclick="init()">1. 카메라 켜기</button>
        <button id="play-btn" type="button" onclick="playGame()">2. 승부하기!</button>
    </div>
    
    <div class="game-area">
        <div class="player-box">
            <span>나 (웹캠)</span>
            <div id="webcam-container"></div>
        </div>
        
        <div class="player-box">
            <span>VS</span>
        </div>

        <div class="player-box">
            <span>컴퓨터</span>
            <div id="computer-screen">❓</div>
        </div>
    </div>

    <div id="result-text">카메라를 켜고 승부하기 버튼을 눌러주세요!</div>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/ZIAb-uHaK7/";

        let model, webcam, maxPredictions;
        let latestPrediction = []; // AI가 분석한 최신 확률 데이터를 임시로 저장할 공간

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // 카메라가 성공적으로 켜지면 '승부하기' 버튼을 화면에 보여줍니다.
            document.getElementById("play-btn").style.display = "inline-block";
            document.getElementById("start-btn").style.display = "none"; // 켜기 버튼은 숨김
            document.getElementById("result-text").innerText = "손 모양을 준비하고 승부하기를 누르세요!";
        }

        async function loop() {
            webcam.update(); 
            await predict(); // 계속해서 화면을 분석하고 확률을 저장합니다.
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // 분석한 결과를 화면에 숫자로 출력하는 대신, latestPrediction 변수에 조용히 저장만 해둡니다.
            latestPrediction = await model.predict(webcam.canvas);
        }

        // 2. 게임 기능 추가 (승패 로직)
        function playGame() {
            // 1. 현재 내 손 모양 확인 (가장 확률이 높은 클래스 찾기)
            let highestProb = 0;
            let myMove = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                if (latestPrediction[i].probability > highestProb) {
                    highestProb = latestPrediction[i].probability;
                    myMove = latestPrediction[i].className; 
                    // 주의: 티처블 머신에서 학습시킨 클래스 이름이 '가위', '바위', '보' 여야 정상 작동합니다.
                }
            }

            // 만약 아무것도 인식되지 않았거나 확률이 너무 낮으면(배경만 보일 때 등)
            if (highestProb < 0.6) {
                document.getElementById("result-text").innerText = "손 모양을 카메라에 정확히 보여주세요! 🤔";
                return;
            }

            // 2. 컴퓨터의 무작위 선택
            const moves = ["가위", "바위", "보"];
            const emojis = {"가위": "✌️", "바위": "✊", "보": "🖐️"}; // 화면에 보여줄 이모지 매칭
            
            // 0, 1, 2 중 랜덤한 숫자를 뽑아 컴퓨터의 선택을 결정합니다.
            const randomIndex = Math.floor(Math.random() * 3);
            const computerMove = moves[randomIndex];
            
            // 컴퓨터 화면 영역에 이모지 표시
            document.getElementById("computer-screen").innerText = emojis[computerMove];

            // 3. 승패 판정
            let resultMessage = "";
            
            if (myMove === computerMove) {
                resultMessage = "앗! 비겼습니다. 다시 도전! 😅";
            } else if (
                (myMove === "가위" && computerMove === "보") ||
                (myMove === "바위" && computerMove === "가위") ||
                (myMove === "보" && computerMove === "바위")
            ) {
                resultMessage = "🎉 축하합니다! 이겼습니다! 🎉";
            } else {
                resultMessage = "😭 아쉽지만 졌습니다. 😭";
            }

            // 4. 결과 출력
            document.getElementById("result-text").innerText = resultMessage;
        }
    </script>
</body>
